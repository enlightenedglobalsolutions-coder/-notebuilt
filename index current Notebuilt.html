<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15181D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Notebuilt</title>
<style>
  /* ---- Design tokens: a leather field-notebook holding spec-stamp pages ---- */
  :root{
    --ink:#15181D;        /* notebook cover / app shell */
    --ink-2:#1C2027;      /* raised surface */
    --ink-3:#252A33;      /* card */
    --line:#333A45;       /* hairline rule (blueprint) */
    --line-soft:#2A2F39;
    --paper:#ECE6D8;      /* light text on dark */
    --paper-dim:#A7A294;  /* secondary text */
    --paper-faint:#6E6B61;/* tertiary */
    --brass:#D7A94B;      /* hardware accent */
    --brass-deep:#9A6E27;
    --doing:#6E92B8;      /* slate blue */
    --done:#7E9D63;       /* sage */
    --danger:#C8654B;
    --radius:14px;
    --radius-sm:10px;
    --tap:46px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
    --serif:ui-serif,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--sans);
    font-size:16px;line-height:1.45;
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px;color:var(--paper)}
  ::placeholder{color:var(--paper-faint)}

  /* ---- App frame ---- */
  #app{
    min-height:100%;
    padding:calc(var(--safe-t) + 4px) 0 calc(var(--tap) + var(--safe-b) + 78px);
    max-width:680px;margin:0 auto;
  }
  .topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px 12px;
  }
  .topbar h1{
    font-family:var(--serif);font-weight:600;
    font-size:25px;letter-spacing:.2px;margin:0;flex:1;
  }
  .topbar .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--brass);display:block;margin-bottom:1px;
  }
  .icon-btn{
    width:var(--tap);height:var(--tap);border-radius:12px;
    display:grid;place-items:center;color:var(--paper-dim);
    background:var(--ink-2);
  }
  .icon-btn:active{background:var(--ink-3)}
  .icon-btn svg{width:22px;height:22px}

  .wrap{padding:0 16px}
  .muted{color:var(--paper-dim)}
  .faint{color:var(--paper-faint)}
  .mono{font-family:var(--mono)}

  /* ---- Cards ---- */
  .card{
    background:var(--ink-3);border:1px solid var(--line-soft);
    border-radius:var(--radius);padding:14px;margin-bottom:12px;
  }
  .card:active{border-color:var(--line)}
  .row{display:flex;align-items:center;gap:12px}
  .grow{flex:1;min-width:0}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---- Section heading w/ blueprint rule ---- */
  .sec-head{
    display:flex;align-items:baseline;gap:10px;margin:18px 0 10px;
  }
  .sec-head .label{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--paper-dim);white-space:nowrap;
  }
  .sec-head .rule{flex:1;height:1px;background:var(--line)}
  .sec-head .count{font-family:var(--mono);font-size:11px;color:var(--paper-faint)}

  /* ---- Status chip (the punch) ---- */
  .chip{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
    text-transform:uppercase;padding:4px 9px;border-radius:999px;
    border:1px solid currentColor;white-space:nowrap;
  }
  .chip.todo{color:var(--paper-faint)}
  .chip.doing{color:var(--doing)}
  .chip.done{color:var(--done)}
  .chip.status-active{color:var(--brass)}
  /* CHUNK19_CATEGORY_SYSTEM */
  .chip-filter{
    font-family:var(--mono);font-size:11px;letter-spacing:.05em;
    padding:6px 12px;border-radius:999px;border:1px solid var(--line-soft);
    background:var(--ink-2);color:var(--paper-dim);white-space:nowrap;
  }
  .chip-filter.active{background:var(--brass);color:#231a07;border-color:var(--brass)}
  .cat-badge{font-size:15px;line-height:1;flex:none}
  .chip.status-quoting{color:var(--doing)}
  .chip.status-done{color:var(--done)}

  /* ---- Task row ---- */
  .task{display:flex;align-items:flex-start;gap:12px;padding:13px 14px}
  .punch{
    flex:none;width:30px;height:30px;border-radius:8px;margin-top:1px;
    border:1.5px solid var(--line);display:grid;place-items:center;
    color:var(--paper-faint);transition:.12s;
  }
  .punch.doing{border-color:var(--doing);color:var(--doing)}
  .punch.done{border-color:var(--done);color:var(--done);background:rgba(126,157,99,.14)}
  .punch:active{transform:scale(.92)}
  .punch svg{width:16px;height:16px}
  .task .body{flex:1;min-width:0}
  .task .ttext{line-height:1.35}
  .task.is-done .ttext{color:var(--paper-faint);text-decoration:line-through}
  .task .meta{font-family:var(--mono);font-size:11px;color:var(--paper-faint);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .task .meta .h-tag{color:var(--brass)}

  /* ---- House card ---- */
  .house-card{padding:0;overflow:hidden}
  .house-cover{
    height:118px;background:var(--ink-2);position:relative;
    display:grid;place-items:center;color:var(--paper-faint);
    background-size:cover;background-position:center;
  }
  .house-cover .blueprint{
    position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .house-cover svg{width:34px;height:34px;position:relative}
  /* ===== SORTED ENGINE — picker grid ===== */
  .sorted-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    margin-top:12px;max-height:60vh;overflow-y:auto;padding-bottom:4px;
  }
  .sorted-cell{
    position:relative;aspect-ratio:1/1;border-radius:var(--radius-sm);
    background:var(--ink-2) center/cover no-repeat;border:1px solid var(--line);
    padding:0;cursor:pointer;overflow:hidden;
  }
  .sorted-cell.is-current{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass)}
  .sorted-star{
    position:absolute;top:5px;right:5px;display:grid;place-items:center;
    width:26px;height:26px;border-radius:50%;
    background:rgba(21,24,29,.72);color:var(--brass);
  }
  .sorted-star svg{width:16px;height:16px}
  .house-card .hc-body{padding:12px 14px}
  .house-card .hc-name{font-family:var(--serif);font-size:18px;font-weight:600}
  .house-card .hc-addr{font-size:13px;color:var(--paper-dim);margin-top:1px}

  /* ---- Spec stamp ---- */
  .spec-cat{margin-bottom:6px}
  .spec-row{
    display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line-soft);
    align-items:baseline;
  }
  .spec-row:last-child{border-bottom:none}
  .spec-room{
    font-family:var(--mono);font-size:11px;color:var(--paper-dim);
    flex:none;width:74px;text-transform:uppercase;letter-spacing:.06em;
    padding-top:1px;
  }
  .spec-main{flex:1;min-width:0}
  .spec-label{font-size:14px}
  .spec-val{font-family:var(--mono);font-size:13px;color:var(--brass);margin-top:1px;word-break:break-word}
  .spec-note{font-size:12px;color:var(--paper-dim);margin-top:2px}

  /* ---- Photo grid ---- */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .photo-grid .ph{
    aspect-ratio:1;border-radius:8px;background:var(--ink-2);
    background-size:cover;background-position:center;position:relative;
  }
  .photo-grid .ph .x{
    position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:50%;
    background:rgba(0,0,0,.55);display:grid;place-items:center;color:#fff;
  }
  .photo-grid .ph .x svg{width:14px;height:14px}
  /* CHUNK2_PHOTO_LIBRARY */
  .photo-add{
    aspect-ratio:1;border:1.5px dashed var(--line);border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--paper-dim);
  }
  .photo-add svg{width:24px;height:24px}
  .photo-add span{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase}

  /* ---- Inputs ---- */
  .field{margin-bottom:12px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:5px}
  .input,textarea.input,select.input{
    width:100%;background:var(--ink-2);border:1px solid var(--line-soft);
    border-radius:var(--radius-sm);padding:12px 13px;color:var(--paper);
    outline:none;
  }
  .input:focus,textarea.input:focus,select.input:focus{border-color:var(--brass)}
  textarea.input{resize:vertical;min-height:96px;line-height:1.5}

  /* ---- Buttons ---- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    min-height:var(--tap);padding:0 18px;border-radius:12px;font-weight:600;
    background:var(--ink-3);color:var(--paper);border:1px solid var(--line-soft);
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brass);color:#231a07;border-color:var(--brass)}
  .btn.danger{color:var(--danger);border-color:var(--danger)}
  .btn.block{display:flex;width:100%}
  .btn.sm{min-height:38px;padding:0 13px;font-size:14px}
  .btn svg{width:18px;height:18px}

  /* ---- FAB ---- */
  .fab{
    position:fixed;right:18px;z-index:30;
    bottom:calc(var(--tap) + var(--safe-b) + 92px);
    width:58px;height:58px;border-radius:18px;background:var(--brass);color:#231a07;
    display:grid;place-items:center;box-shadow:0 8px 22px rgba(0,0,0,.45);
  }
  .fab:active{transform:translateY(1px)}
  .fab svg{width:26px;height:26px}

  /* ---- Bottom nav ---- */
  .nav{
    position:fixed;left:0;right:0;bottom:0;z-index:25;
    background:rgba(20,24,29,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line-soft);
    padding-bottom:var(--safe-b);
    display:flex;
  }
  .nav button{
    flex:1;min-height:var(--tap);padding:9px 0 7px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--paper-faint);font-size:10.5px;letter-spacing:.04em;
  }
  .nav button.active{color:var(--brass)}
  .nav button svg{width:23px;height:23px}

  /* ---- Sheet / modal ---- */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.55);display:flex;align-items:flex-end}
  .sheet{
    background:var(--ink-2);width:100%;max-width:680px;margin:0 auto;
    border-radius:20px 20px 0 0;border-top:1px solid var(--line);
    padding:8px 16px calc(18px + var(--safe-b));max-height:90vh;overflow:auto;
    animation:rise .18s ease-out;
  }
  @keyframes rise{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
  .sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 14px}
  .sheet h2{font-family:var(--serif);font-size:21px;margin:0 0 14px}

  /* ---- Empty states ---- */
  .empty{text-align:center;padding:46px 24px;color:var(--paper-dim)}
  .empty svg{width:40px;height:40px;color:var(--line);margin-bottom:12px}
  /* CHUNK12_STAR_OUTLINE */
  .note-star{display:inline-flex;flex:none;vertical-align:-2px}
  .note-star svg{width:15px;height:15px;display:block}
  /* CHUNK15_CHEVRON_SIZE */
  .chev{display:inline-flex;flex:none;color:var(--paper-faint)}
  .chev svg{width:18px;height:18px;display:block}
  .empty .t{font-family:var(--serif);font-size:18px;color:var(--paper);margin-bottom:4px}

  /* ---- Lock screen ---- */
  #lock{
    position:fixed;inset:0;z-index:100;background:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px;gap:6px;
  }
  #lock .mark{margin-bottom:10px}
  #lock .mark svg{width:58px;height:58px}
  #lock .name{font-family:var(--serif);font-size:24px}
  #lock .hint{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:18px}
  .dots{display:flex;gap:14px;margin:8px 0 6px}
  .dots .d{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line)}
  .dots .d.on{background:var(--brass);border-color:var(--brass)}
  .keypad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin-top:14px}
  .keypad button{
    height:72px;border-radius:50%;background:var(--ink-2);font-family:var(--mono);
    font-size:24px;color:var(--paper);border:1px solid var(--line-soft);
  }
  .keypad button:active{background:var(--ink-3)}
  .keypad button.blank{background:none;border:none}
  #lock .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}

  /* CHUNK18_INSTALL_PROMPT */
  #install-banner{
    position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 14px);z-index:40;
    background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 10px 12px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #install-banner .txt{flex:1;font-size:13px;line-height:1.4;color:var(--paper-dim)}
  #install-banner .txt b{color:var(--paper);display:block;font-family:var(--serif);font-size:15px;margin-bottom:2px}

  /* CHUNK21_BACKUP_NUDGE */
  #backup-banner{
    position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 14px);z-index:40;
    background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 10px 12px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #backup-banner .txt{flex:1;font-size:13px;line-height:1.4;color:var(--paper-dim)}
  #backup-banner .txt b{color:var(--paper);display:block;font-family:var(--serif);font-size:15px;margin-bottom:2px}

  /* ---- Toast ---- */
  #toast{
    position:fixed;left:50%;transform:translateX(-50%);z-index:200;
    bottom:calc(var(--tap) + var(--safe-b) + 96px);
    background:var(--brass);color:#231a07;font-weight:600;font-size:14px;
    padding:11px 18px;border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.4);
    opacity:0;transition:.2s;pointer-events:none;max-width:84%;text-align:center;
  }
  #toast.show{opacity:1}

  /* CHUNK3_PHOTO_VIEWER */
  #viewer{
    position:fixed;inset:0;z-index:60;background:rgba(6,8,10,.96);
    display:flex;flex-direction:column;
  }
  #viewer .v-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-t) + 10px) 12px 10px;flex:none;
  }
  #viewer .icon-btn{background:rgba(255,255,255,.08)}
  /* CHUNK4_ROTATE_PHOTO */
  #viewer .icon-btn.danger{color:var(--danger)}
  #viewer .v-actions{display:flex;gap:8px}

  /* CHUNK6_PHOTO_ANNOTATE */
  #annotate{
    position:fixed;inset:0;z-index:70;background:rgba(6,8,10,.97);
    display:flex;flex-direction:column;
  }
  #annotate .icon-btn{background:rgba(255,255,255,.08)}
  #annotate .a-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-t) + 10px) 12px 8px;flex:none;
  }
  #annotate .a-title{font-family:var(--serif);font-size:16px;color:var(--paper)}
  #annotate .a-tools{
    display:flex;align-items:center;gap:8px;padding:4px 12px 10px;flex:none;overflow-x:auto;
  }
  .a-tool{
    width:44px;height:44px;border-radius:10px;background:var(--ink-2);color:var(--paper-dim);
    display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:15px;flex:none;
  }
  .a-tool.active{background:var(--brass);color:#231a07}
  .a-tool svg{width:20px;height:20px}
  .a-swatches{display:flex;align-items:center;gap:8px;margin:0 4px;flex:none}
  .a-swatch{width:30px;height:30px;border-radius:50%;border:2px solid transparent;flex:none}
  .a-swatch.active{border-color:var(--paper)}
  /* CHUNK7_CALLOUT_ANNOTATE */
  .a-shapes .a-tool{font-size:19px}
  #annotate .a-hint{
    text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--paper-faint);padding:8px 12px calc(var(--safe-b) + 10px);flex:none;
  }
  #annotate .a-stage{
    flex:1;position:relative;display:flex;align-items:center;justify-content:center;
    overflow:hidden;touch-action:none;padding:16px;
  }
  #annotate .a-stage canvas{touch-action:none;background:#000;border-radius:4px}
  #viewer .v-count{font-family:var(--mono);font-size:12px;color:var(--paper-dim);letter-spacing:.06em}
  #viewer .v-stage{
    flex:1;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    touch-action:none;
  }
  #viewer .v-stage img{
    max-width:100%;max-height:100%;object-fit:contain;
    user-select:none;-webkit-user-drag:none;will-change:transform;
    transform:translate(0px,0px) scale(1);
  }
  #viewer .v-hint{
    text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--paper-faint);padding:8px 0 calc(var(--safe-b) + 10px);flex:none;
  }

  .hidden{display:none!important}
  hr.div{border:none;border-top:1px solid var(--line-soft);margin:14px 0}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- Measurement widget ---- */
  .meas{display:flex;gap:8px}
  .meas-cell{flex:1;display:flex;flex-direction:column;align-items:center}
  .meas-cell input.meas-box{text-align:center;width:100%}
  .meas-cell label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-dim);margin-top:4px}
  .unit-toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:auto}
  .unit-toggle button{background:transparent;color:var(--paper-dim);border:0;padding:5px 12px;font-size:12px;font-family:var(--mono);cursor:pointer}
  .unit-toggle button.on{background:var(--brass);color:var(--ink)}
  /* ---- Calculator ---- */
  .cecho{display:block;font-family:var(--mono);font-size:12px;color:var(--brass);margin-top:5px;min-height:15px}
  .crow{display:flex;gap:8px;margin:4px 0 12px}
  .crow .btn{flex:1;justify-content:center;font-size:20px;padding:8px}
  .cresult{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:8px;text-align:center}
  .cresult .muted{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .cbig{font-family:var(--serif);font-size:32px;color:var(--paper);margin-top:6px;line-height:1.1}
  /* ---- Crop editor ---- */
  #crop-stage{cursor:grab}
  #crop-stage:active{cursor:grabbing}
</style>
</head>
<body>
<div id="lock" class="hidden"></div>
<div id="app"></div>
<button id="fab" class="fab hidden" aria-label="Add"></button>
<nav id="nav" class="nav hidden"></nav>
<div id="modal-root"></div>
<div id="viewer" class="hidden"></div>
<div id="annotate" class="hidden"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================
   Punch List — a privacy-first field notebook PWA
   Single file. All data on-device (localStorage + IndexedDB).
   ============================================================ */

const APP_NAME = "Notebuilt";   /* <-- change here + in manifest.webmanifest + <title> to rename */
/* CHUNK16_SUPPORT_PAGE
   Fill in your real BTC / Stripe / PayPal / Wise values below.
   Interac is already your real EGS details. */
const PAYMENT_CONFIG = {
  interacEmail: 'egspay.pay@gmail.com',
  interacMemo: 'Notebuilt Donation',
  btc: 'YOUR_BTC_ADDRESS',
  stripe: 'STRIPE_PAYMENT_LINK',
  paypal: 'PAYPAL_DONATE_LINK',
  wise: 'WISE_PAYMENT_LINK'
};
const PAYMENT_TABS = [
  {id:'interac', label:'\ud83c\udfe6 Interac'},

/* ---------- storage: localStorage JSON ---------- */
/* EGS durability guard: persist + backup + self-heal + empty-overwrite protection */
(function(){
  const CRIT = ['pl.houses','pl.tasks','pl.notes','pl.settings'];
  const boot = Date.now();
  let _set, _get;
  try { _set = localStorage.setItem.bind(localStorage); _get = localStorage.getItem.bind(localStorage); } catch(e){ return; }
  const blank = v => v==null || v==='' || v==='[]' || v==='{}' || v==='null' || v==='undefined';
  /* self-heal before the app loads its data */
  try { for (const k of CRIT){ const cur=_get(k), bak=_get(k+'_bak'); if (blank(cur) && !blank(bak)) _set(k, bak); } } catch(e){}
  /* guarded saves */
  try {
    localStorage.setItem = function(key, val){
      try {
        if (CRIT.includes(key)){
          const existing = _get(key);
          if (blank(val) && !blank(existing) && (Date.now()-boot) < 8000){
            console.warn('Durability: blocked empty overwrite of '+key+' at startup');
            return;
          }
          if (!blank(val)) { try { _set(key+'_bak', val); } catch(e){} }
        }
      } catch(e){}
      return _set(key, val);
    };
  } catch(e){}
  /* ask the browser not to evict our data (covers IndexedDB photos too) */
  try {
    if (navigator.storage && navigator.storage.persist){
      navigator.storage.persisted().then(p => { if(!p) navigator.storage.persist(); }).catch(()=>{});
    }
  } catch(e){}
})();

let _db=null;
function db(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('punchlist',1);
    r.onupgradeneeded=()=>{ const d=r.result; if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'}); };
    r.onsuccess=()=>{ _db=r.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
async function photoPut(rec){ const d=await db(); return new Promise((res,rej)=>{ const t=d.transaction('photos','readwrite'); t.objectStore('photos').put(rec); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function photoGet(id){ const d=await db(); return new Promise((res,rej)=>{ const r=d.transaction('photos','readonly').objectStore('photos').get(id); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function photoDel(id){ const d=await db(); return new Promise((res,rej)=>{ const t=d.transaction('photos','readwrite'); t.objectStore('photos').delete(id); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function photoAll(){ const d=await db(); return new Promise((res,rej)=>{ const out=[]; const c=d.transaction('photos','readonly').objectStore('photos').openCursor(); c.onsuccess=e=>{const cur=e.target.result; if(cur){out.push(cur.value);cur.continue();}else res(out);}; c.onerror=()=>rej(c.error); }); }

/* downscale to <=1000px longest edge, JPEG ~0.8, return Blob */
function downscale(file){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1000; let {width:w,height:h}=img;
      if(w>max||h>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('encode failed')); },'image/jpeg',0.8);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('bad image')); };
    img.src=url;
  });
}
const _objUrls=new Map();
async function photoURL(id){
  if(_objUrls.has(id)) return _objUrls.get(id);
  const rec=await photoGet(id); if(!rec) return '';
  const u=URL.createObjectURL(rec.blob); _objUrls.set(id,u); return u;
}

function sortHousesList(list){
  const mode=settings.sortHouses||'updated';
  const statusOrder={active:0,quoting:1,done:2};
  const openCount=h=>tasks.filter(t=>t.houseId===h.id&&t.status!=='done').length;
  const arr=[...list];
  if(mode==='created') arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  else if(mode==='alpha') arr.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(mode==='status') arr.sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9)||(b.updatedAt-a.updatedAt));
  else if(mode==='category') arr.sort((a,b)=>(categoryLabel(a.category)||'').localeCompare(categoryLabel(b.category)||'')||(b.updatedAt-a.updatedAt));

  else if(mode==='jobtype') arr.sort((a,b)=>(JOB_TYPE_LABEL[a.jobType]||'').localeCompare(JOB_TYPE_LABEL[b.jobType]||'')||(b.updatedAt-a.updatedAt));
  else if(mode==='open') arr.sort((a,b)=>openCount(b)-openCount(a)||(b.updatedAt-a.updatedAt));
  else arr.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  return arr;

let _leavingView=null;
function autosaveOpenNote(){
  // If a note editor is on screen, quietly persist any edits before we leave it.
  const titleEl=$app.querySelector('#note-title'); const bodyEl=$app.querySelector('#note-body');
  if(!titleEl||!bodyEl) return;
  if(!_leavingView || _leavingView.name!=='note') return;
  const id=_leavingView.param;
  const title=titleEl.value.trim(); const body=bodyEl.value;
  const houseSel=$app.querySelector('#note-house'); const houseId=houseSel?houseSel.value||null:null;
  const impEl=$app.querySelector('#note-important'); const important=impEl?impEl.checked:false;
  if(!title && !body.trim()) return;               // nothing worth saving
  if(id==='new'){
    // promote the new note to a saved one so we don't duplicate on next autosave
    const nn={id:uid(),title,body,houseId,important,createdAt:now(),updatedAt:now()};
    notes.push(nn); _lastAutosavedNewId=nn.id; persist.notes();
  } else {
    const n=notes.find(x=>x.id===id);
    if(n){ n.title=title; n.body=body; n.houseId=houseId; n.important=important; n.updatedAt=now(); persist.notes(); }
  }
}
let _lastAutosavedNewId=null;
function render(){
  autosaveOpenNote();                              // save the screen we're leaving
  // if a brand-new note was just autosaved, keep editing it as a real note
  if(_leavingView && _leavingView.name==='note' && _leavingView.param==='new' && _lastAutosavedNewId && view.name==='note' && view.param==='new'){
    view.param=_lastAutosavedNewId;
  }
  _lastAutosavedNewId=null;
  _leavingView={name:view.name,param:view.param};

}

/* ============================================================
   SETTINGS
   ============================================================ */
/* ============================================================
   MEASUREMENT WIDGET (shared ft/in/frac + metric)
   ============================================================ */
// ============================================================================
//  EGS Measurement Widget — shared across Notebuilt + Stagger
//  Stores INCHES internally (all engines speak inches). The unit mode only
//  changes how the boxes render and how we read them back. Nothing downstream
//  ever sees anything but inches.
//
//  Imperial: three boxes  ft | in | fraction(typed, e.g. 1/4)
//  Metric:   two boxes     m  | cm
//  Unit mode: global default (settings.units) + optional per-field override.
// ============================================================================

var MEAS_MODE_DEFAULT = "imperial";  // host overrides from settings

// ---- conversions (inch is the canonical unit) ----
function inchesToImperial(inches){
  var neg = inches < 0; inches = Math.abs(inches);
  var totalSix = Math.round(inches * 16);
  var ft = Math.floor(totalSix / (12*16)); totalSix -= ft*12*16;
  var inch = Math.floor(totalSix / 16); var fr = totalSix - inch*16;
  var fracStr = "";
  if (fr > 0){ var n=fr, d=16; while(n%2===0 && d>1){ n/=2; d/=2; } fracStr = n + "/" + d; }
  return { ft: (neg?-ft:ft), in: inch, frac: fracStr };
}
function imperialToInches(ftStr, inStr, fracStr){
  var ft = parseFloat(ftStr); if (isNaN(ft)) ft = 0;
  var inch = parseFloat(inStr); if (isNaN(inch)) inch = 0;
  var frac = 0;
  if (fracStr && String(fracStr).trim()){
    var m = String(fracStr).trim().match(/^(\d+)\s*\/\s*(\d+)$/);
    if (m){ var dd=+m[2]; if(!dd) return null; frac = (+m[1])/dd; }
    else if (/^\d*\.?\d+$/.test(fracStr.trim())) { frac = parseFloat(fracStr); } // tolerate a decimal
    else return null; // unreadable fraction
  }
  var sign = ft < 0 ? -1 : 1;
  return sign * (Math.abs(ft)*12 + inch + frac);
}
var MM_PER_INCH = 25.4;
function inchesToMetric(inches){
  var mm = inches * MM_PER_INCH;
  var m = Math.floor(mm / 1000);
  var cm = Math.round((mm - m*1000) / 10 * 10) / 10;  // cm to 1 decimal
  if (cm >= 100){ m += 1; cm -= 100; }
  return { m: m, cm: cm };
}
function metricToInches(mStr, cmStr){
  var m = parseFloat(mStr); if (isNaN(m)) m = 0;
  var cm = parseFloat(cmStr); if (isNaN(cm)) cm = 0;
  var mm = m*1000 + cm*10;
  return mm / MM_PER_INCH;
}

// ---- read a widget's DOM back to inches (null if unreadable) ----
function measRead(rootEl){
  var mode = rootEl.getAttribute("data-mode") || MEAS_MODE_DEFAULT;
  if (mode === "metric"){
    var m = rootEl.querySelector('[data-meas-m]').value;
    var cm = rootEl.querySelector('[data-meas-cm]').value;
    if (String(m).trim()==="" && String(cm).trim()==="") return null;
    return metricToInches(m, cm);
  } else {
    var ft = rootEl.querySelector('[data-meas-ft]').value;
    var inch = rootEl.querySelector('[data-meas-in]').value;
    var frac = rootEl.querySelector('[data-meas-frac]').value;
    if (String(ft).trim()==="" && String(inch).trim()==="" && String(frac).trim()==="") return null;
    return imperialToInches(ft, inch, frac);
  }
}

// ---- render a widget (returns HTML string). id must be unique on screen. ----
function measWidget(id, inches, mode){
  mode = mode || MEAS_MODE_DEFAULT;
  var box = 'class="input meas-box" inputmode="decimal" autocomplete="off"';
  if (mode === "metric"){
    var v = (inches!=null) ? inchesToMetric(inches) : {m:"",cm:""};
    return '<div class="meas" data-meas="'+id+'" data-mode="metric">'
      + '<span class="meas-cell"><input '+box+' data-meas-m value="'+v.m+'" placeholder="0"><label>m</label></span>'
      + '<span class="meas-cell"><input '+box+' data-meas-cm value="'+v.cm+'" placeholder="0"><label>cm</label></span>'
      + '</div>';
  } else {
    var w = (inches!=null) ? inchesToImperial(inches) : {ft:"",in:"",frac:""};
    return '<div class="meas" data-meas="'+id+'" data-mode="imperial">'
      + '<span class="meas-cell"><input '+box+' data-meas-ft value="'+w.ft+'" placeholder="0"><label>ft</label></span>'
      + '<span class="meas-cell"><input '+box+' data-meas-in value="'+w.in+'" placeholder="0"><label>in</label></span>'
      + '<span class="meas-cell"><input class="input meas-box" autocomplete="off" data-meas-frac value="'+w.frac+'" placeholder="0"><label>frac</label></span>'
      + '</div>';
  }
}

// ---- the echo string (what the value reads as, in the OTHER unit for cross-check) ----
function measEcho(inches, mode){
  if (inches==null) return "";
  mode = mode || MEAS_MODE_DEFAULT;
  if (mode === "metric"){
    var w = inchesToImperial(inches);
    var s = (w.ft?w.ft+"'-":"") + w.in + (w.frac?" "+w.frac:"") + '"';
    return "= " + s + " imperial";
  } else {
    var mm = Math.round(inches*MM_PER_INCH);
    return "= " + mm + " mm";
  }
}

function measMode(){ return (settings.units==='metric')?'metric':'imperial'; }

/* ============================================================
   CONSTRUCTION CALCULATOR  (feet-inch-fraction native)
   ============================================================ */
// Parse tape notation to inches: 21'-10 1/4, 21' 10 1/4", 10 1/4, 5/8, 21-10-1/4, 8'
function calcParse(str){
  if(str==null) return null;
  var s=String(str).trim().toLowerCase();
  if(!s) return null;
  s=s.replace(/[\u2032\u2019]/g,"'").replace(/[\u2033\u201d]/g,'"');
  s=s.replace(/ft\b/g,"'").replace(/in\b/g,'"');
  s=s.replace(/\s*-\s*/g," ").replace(/\s+/g," ").trim();
  var feet=0, sawFeet=false, sawInch=/"/.test(s);
  s=s.replace(/"/g,"");
  var fm=s.match(/^(\d+(?:\.\d+)?)\s*'/);
  if(fm){ feet=parseFloat(fm[1]); sawFeet=true; s=s.slice(fm[0].length).trim(); }
  var inches=0;
  if(s){
    var parts=s.split(" ");
    var whole=0, frac=0, ok=true;
    if(parts.length===1){
      if(parts[0].indexOf("/")>=0){ frac=calcFrac(parts[0]); ok=frac!=null; }
      else { whole=parseFloat(parts[0]); ok=!isNaN(whole); }
    } else if(parts.length===2 && parts[1].indexOf("/")>=0){
      whole=parseFloat(parts[0]); frac=calcFrac(parts[1]); ok=!isNaN(whole)&&frac!=null;
    } else ok=false;
    if(!ok) return null;
    inches=whole+(frac||0);
  }
  if(sawFeet) return feet*12+inches;
  if(sawInch) return inches;
  return inches; // bare number on the calc = inches
}
function calcFrac(t){ var m=t.match(/^(\d+)\/(\d+)$/); if(!m) return null; var d=+m[2]; return d?(+m[1])/d:null; }
// inches -> tape string, rounded to nearest 1/16
function calcFmt(inch){
  if(inch==null||isNaN(inch)) return "\u2014";
  var neg=inch<0; inch=Math.abs(inch);
  var totalSix=Math.round(inch*16);          // round once, in sixteenths of an inch
  var f=Math.floor(totalSix/(12*16)); totalSix-=f*12*16;
  var w=Math.floor(totalSix/16), fr=totalSix-w*16;
  var fs="";
  if(fr>0){ var n=fr,d=16; while(n%2===0&&d>1){n/=2;d/=2;} fs=" "+n+"/"+d; }
  var out=(neg?"\u2212":"");
  if(f>0) out+=f+"'-"+w+fs+'"';
  else out+=w+fs+'"';
  return out;
}
var CALC={mode:"tape", a:null, b:null, op:"+", num:"", bf_t:null, bf_w:null, bf_l:null, ar_w:null, ar_l:null, sq_a:null, sq_b:null};

// Format an inches value for display in the ACTIVE unit mode.
function calcShow(inch){
  if(inch==null||isNaN(inch)) return "\u2014";
  if(measMode()==="metric"){ var mm=Math.round(inch*25.4); return (mm>=1000?(Math.round(mm/10)/100)+" m":mm+" mm"); }
  return calcFmt(inch);
}
function calcRecompute(){
  var wrap=$app.querySelector('.wrap'); if(!wrap) return;
  var slotOf={ "c-a":"a","c-b":"b","bf_t":"bf_t","bf_w":"bf_w","bf_l":"bf_l","ar_w":"ar_w","ar_l":"ar_l","sq_a":"sq_a","sq_b":"sq_b" };
  wrap.querySelectorAll('.meas').forEach(function(root){
    var slot=slotOf[root.getAttribute("data-meas")]; if(!slot) return;
    var echo=root.parentNode.querySelector('.cecho'); if(echo){ var v=CALC[slot]; echo.textContent=(v!=null)?measEcho(v,measMode()):""; }
  });
  var old=wrap.querySelector('.cresult'); var m=CALC.mode;
  // board-feet / area / square-up: value blocks depend on the result; simplest correct path is a full render
  if(m==="bf"||m==="area"||m==="sq"){ render(); return; }
  if(!old) { render(); return; }
  var res=null;
  if(m==="tape"){ if(CALC.a!=null&&CALC.b!=null) res=CALC.op==="+"?CALC.a+CALC.b:CALC.a-CALC.b; }
  else if(m==="md"){ if(CALC.a!=null){ var n=parseFloat(CALC.num); if(!isNaN(n)&&String(CALC.num).trim()!==""){ res=CALC.op==="*"?CALC.a*n:(n!==0?CALC.a/n:null); } } }
  var tmp=document.createElement('div'); tmp.innerHTML=calcResult(res); old.replaceWith(tmp.firstChild);
}
function renderCalc(){
  var m=CALC.mode, mode=measMode();
  var unitTog='<div class="unit-toggle"><button class="'+(mode==="imperial"?"on":"")+'" data-units-set="imperial">ft/in</button><button class="'+(mode==="metric"?"on":"")+'" data-units-set="metric">metric</button></div>';
  var tabs=[["tape","Add / Subtract"],["md","Multiply / Divide"],["bf","Board Feet"],["area","Area"],["sq","Square-up"]];
  var tabhtml=tabs.map(function(t){return '<button class="btn sm '+(m===t[0]?'primary':'')+'" data-calc-mode="'+t[0]+'" style="margin:0 6px 6px 0">'+t[1]+'</button>';}).join("");
  var body="";
  if(m==="tape"||m==="md"){
    var ops = m==="tape" ? [["+","+"],["\u2212","-"]] : [["\u00d7","*"],["\u00f7","/"]];
    var A=CALC.a, res=null;
    if(A!=null){
      if(m==="tape"){ if(CALC.b!=null) res = CALC.op==="+"?A+CALC.b:A-CALC.b; }
      else { var n=parseFloat(CALC.num); if(!isNaN(n)&&CALC.num.trim()!==""){ res = CALC.op==="*"?A*n:(n!==0?A/n:null); } }
    }
    body=''
    +'<div class="field"><label>'+(m==="tape"?"First measurement":"Measurement")+'</label>'+measWidget("c-a",CALC.a,mode)+'<span class="cecho">'+(CALC.a!=null?measEcho(CALC.a,mode):"")+'</span></div>'
    +'<div class="crow">'+ops.map(function(o){return '<button class="btn '+(CALC.op===o[1]?'primary':'')+'" data-calc-op="'+o[1]+'">'+o[0]+'</button>';}).join("")+'</div>'
    +(m==="tape"
       ? '<div class="field"><label>Second measurement</label>'+measWidget("c-b",CALC.b,mode)+'<span class="cecho">'+(CALC.b!=null?measEcho(CALC.b,mode):"")+'</span></div>'
       : '<div class="field"><label>'+(CALC.op==="*"?"Times (number)":"Divide by (number)")+'</label><input class="input" id="c-num" inputmode="decimal" value="'+esc(CALC.num)+'" placeholder="3" autocomplete="off"></div>')
    +calcResult(res);
  } else if(m==="bf"){
    var bf=null;
    if(CALC.bf_t!=null&&CALC.bf_w!=null&&CALC.bf_l!=null) bf=(CALC.bf_t*CALC.bf_w*CALC.bf_l)/144;
    body=''
    +'<p class="muted" style="font-size:13px;margin:0 0 10px">Board feet = thickness \u00d7 width \u00d7 length \u00f7 144.</p>'
    +calcMField("bf_t","Thickness",CALC.bf_t,mode)
    +calcMField("bf_w","Width",CALC.bf_w,mode)
    +calcMField("bf_l","Length",CALC.bf_l,mode)
    +(bf!=null?'<div class="cresult"><div class="muted">Board feet</div><div class="cbig">'+(Math.round(bf*100)/100)+' bf</div></div>':'');
  } else if(m==="area"){
    var sqft=null,sqin=null,sqm=null;
    if(CALC.ar_w!=null&&CALC.ar_l!=null){ sqin=CALC.ar_w*CALC.ar_l; sqft=sqin/144; sqm=sqin*0.00064516; }
    body=''
    +'<p class="muted" style="font-size:13px;margin:0 0 10px">Area from width \u00d7 length.</p>'
    +calcMField("ar_w","Width",CALC.ar_w,mode)
    +calcMField("ar_l","Length",CALC.ar_l,mode)
    +(sqft!=null?'<div class="cresult"><div class="muted">Area</div><div class="cbig">'+(mode==="metric"?(Math.round(sqm*100)/100)+' m\u00b2':(Math.round(sqft*100)/100)+' sq ft')+'</div><div class="muted" style="margin-top:4px">'+(mode==="metric"?(Math.round(sqft*100)/100)+' sq ft':(Math.round(sqm*100)/100)+' m\u00b2')+'</div></div>':'');
  } else if(m==="sq"){
    var diag=null;
    if(CALC.sq_a!=null&&CALC.sq_b!=null) diag=Math.sqrt(CALC.sq_a*CALC.sq_a+CALC.sq_b*CALC.sq_b);
    body=''
    +'<p class="muted" style="font-size:13px;margin:0 0 10px">Diagonal (3-4-5 square check) \u2014 what a square layout should measure corner to corner.</p>'
    +calcMField("sq_a","Side A",CALC.sq_a,mode)
    +calcMField("sq_b","Side B",CALC.sq_b,mode)
    +(diag!=null?'<div class="cresult"><div class="muted">Diagonal</div><div class="cbig">'+calcShow(diag)+'</div></div>':'');
  }
  return '<div class="topbar"><div class="grow"><span class="eyebrow">'+esc(APP_NAME)+'</span><h1>Calculator</h1></div>'+unitTog+'</div>'
    +'<div class="wrap"><div style="display:flex;flex-wrap:wrap;margin-bottom:10px">'+tabhtml+'</div>'+body
    +'<p class="muted" style="font-size:12px;margin-top:16px;line-height:1.5">Enter measurements in the boxes. Switch ft/in \u2194 metric anytime \u2014 values convert automatically.</p></div>';
}
function calcMField(id,label,inchVal,mode){
  return '<div class="field"><label>'+label+'</label>'+measWidget(id,inchVal,mode)+'<span class="cecho">'+(inchVal!=null?measEcho(inchVal,mode):"")+'</span></div>';
}
function calcResult(res){
  return '<div class="cresult"><div class="muted">Result</div><div class="cbig">'+calcShow(res)+'</div>'
    +(res!=null?'<div class="muted" style="margin-top:4px">'+(measMode()==="metric"?calcFmt(res)+" imperial":Math.round(res*25.4)+" mm")+'</div>':"")+'</div>';
}

async function doShareHouse(houseId,opts){
  const h=houseById(houseId); if(!h)return;
  closeSheet();
  toast('Preparing share…');
  try{
    const project={
      name:h.name, status:h.status, jobType:h.jobType||'',
      specs:(h.specs||[]).map(s=>({category:s.category,room:s.room,label:s.label,value:s.value,note:s.note}))
    };
    if(opts.address) project.address=h.address||'';
    if(opts.notes) project.notes=h.notes||'';
    if(opts.tasks){
      project.tasks=tasks.filter(t=>t.houseId===houseId).map(t=>({text:t.text,status:t.status}));
    }
    if(opts.photos && (h.photos||[]).length){
      const photoData={};
      for(const pid of h.photos){
        const rec=await photoGet(pid);
        if(rec) photoData[pid]={b64:await blobToB64(rec.blob)};
      }
      project.photos=photoData;
    }
    const dump={ app:'notebuilt-project-share', version:1, exportedAt:now(), project };
    const json=JSON.stringify(dump);
    const filename='notebuilt-'+(h.name||'project').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+todayKey()+'.json';
    const file=new File([json],filename,{type:'application/json'});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Notebuilt project: '+h.name});
      toast('Shared');
    }else{
      const blob=new Blob([json],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download=filename; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      toast('Downloaded');
    }
  }catch(err){
    if(err && err.name==='AbortError'){ toast('Share cancelled'); return; }
    toast('Could not share project');
  }
}

function moveCategory(id,dir){
  const i=categories.findIndex(c=>c.id===id); if(i<0)return;
  const j=i+dir; if(j<0||j>=categories.length)return;
  [categories[i],categories[j]]=[categories[j],categories[i]];
  persist.categories(); render(); openManageCategories();
}
function deleteCategory(id){
  const affected=houses.filter(h=>h.category===id).length;
  const msg=affected?`Delete this category? ${affected} project${affected===1?'':'s'} using it will show as Uncategorized \u2014 nothing is deleted.`:'Delete this category?';
  if(!confirm(msg)) return;
  categories=categories.filter(c=>c.id!==id);
  houses.forEach(h=>{ if(h.category===id) h.category=null; });
  if(categoryFilter===id) categoryFilter='all';
  persist.categories(); persist.houses(); render(); openManageCategories();
}

  $app.querySelectorAll('[data-units-set]').forEach(b=>b.onclick=()=>{ settings.units=b.dataset.unitsSet; persist.settings(); render(); });
  function calcBindWidget(id, slot){
    var root=$app.querySelector('[data-meas="'+id+'"]'); if(!root) return;
    root.querySelectorAll('input').forEach(function(inp){ inp.oninput=()=>{ CALC[slot]=measRead(root); calcRecompute(); }; });
  }
  calcBindWidget('c-a','a'); calcBindWidget('c-b','b');
  calcBindWidget('bf_t','bf_t'); calcBindWidget('bf_w','bf_w'); calcBindWidget('bf_l','bf_l');
  calcBindWidget('ar_w','ar_w'); calcBindWidget('ar_l','ar_l');
  calcBindWidget('sq_a','sq_a'); calcBindWidget('sq_b','sq_b');
  var cnum=$app.querySelector('#c-num'); if(cnum) cnum.oninput=()=>{ CALC.num=cnum.value; calcRecompute(); };

  /* Clear all done to-dos (in the To Do screen) */
  var clearDone=$app.querySelector('[data-clear-done]');
  if(clearDone) clearDone.onclick=()=>{
    var doneTasks=tasks.filter(t=>t.status==='done');
    if(!doneTasks.length) return;
    if(!confirm('Clear '+doneTasks.length+' completed to-do'+(doneTasks.length>1?'s':'')+'? This can\u2019t be undone.')) return;
    tasks=tasks.filter(t=>t.status!=='done'); persist.tasks(); render(); toast('Cleared '+doneTasks.length+' done');
  };

  /* Notes */
  $app.querySelectorAll('[data-note]').forEach(c=>c.onclick=()=>go('note',c.dataset.note));
  const saveNote=$app.querySelector('[data-save-note]'); if(saveNote) saveNote.onclick=()=>doSaveNote(saveNote.dataset.saveNote);
  const delNote=$app.querySelector('[data-del-note]'); if(delNote) delNote.onclick=()=>{
    if(!confirm('Delete this note?'))return; notes=notes.filter(n=>n.id!==delNote.dataset.delNote); persist.notes(); go('notes'); toast('Note deleted');
  };

  /* Search */
  const q=$app.querySelector('#q'); if(q){ q.oninput=()=>runSearch(q.value); setTimeout(()=>q.focus(),60); }

  /* Settings */
  const pin=$app.querySelector('[data-pin]'); if(pin) pin.onclick=()=>setupPin();
  const pinOff=$app.querySelector('[data-pin-off]'); if(pinOff) pinOff.onclick=()=>{ if(confirm('Turn off the app lock?')){ settings.pinHash=null; settings.pinSalt=null; persist.settings(); render(); toast('App lock off'); } };
  const exp=$app.querySelector('[data-export]'); if(exp) exp.onclick=exportData;
  const imp=$app.querySelector('[data-import]'); if(imp) imp.onchange=importData;
  const impProj=$app.querySelector('[data-import-project]'); if(impProj) impProj.onchange=importSharedProject;
  $app.querySelectorAll('[data-pay-tab]').forEach(b=>b.onclick=()=>{
    supportTab=b.dataset.payTab;
    $app.querySelectorAll('[data-pay-tab]').forEach(x=>x.classList.toggle('primary',x.dataset.payTab===supportTab));
    const detail=document.getElementById('pay-detail'); if(detail){ detail.innerHTML=paymentDetailHtml(supportTab); bindCopyButtons(detail); }
  });
  bindCopyButtons($app);
}

async function handlePhoto(e,houseId){
  const files=e.target.files?Array.from(e.target.files):[]; if(!files.length)return;
  const multi=files.length>1;
  toast(multi?`Saving ${files.length} photos…`:'Saving photo…');
  const h=houseById(houseId); h.photos=h.photos||[];
  let saved=0, failed=0;
  for(const file of files){
    try{
      const blob=await downscale(file); const id=uid();
      await photoPut({id,blob,houseId,createdAt:now()});
      h.photos.push(id);
      if(!h.cover) h.cover=id;
      saved++;
    }catch(err){ failed++; }
  }
  h.updatedAt=now(); persist.houses(); render();
  e.target.value='';
  if(saved && failed) toast(`${saved} saved, ${failed} could not be read`);
  else if(failed) toast('Could not read those images');
  else toast(multi?`${saved} photos saved`:'Photo saved');
}

/* ===== SORTED ENGINE START =====
   Sorted - reusable media-sorting engine, shared across EGS apps (Notebuilt, Kept, standalone Sorted).
   The engine never touches storage: the host passes media-item refs plus a resolve() that turns a
   ref into a displayable URL, and receives the user's choice via callback. The host owns persistence.
   First feature built on it: the cover-photo picker below. Later features (dedupe, corruption
   detection, integrity manifest) reuse this same list + resolve + grid spine. */
const Sorted=(function(){
  /* Open a picker sheet: a grid of media thumbnails, the current pick starred, tap to choose.
     opts = { items:[ref,...], resolve:ref=>Promise<url|null>, current:ref|null, title, onPick:ref=>void } */
  function pickGrid(opts){
    const items=(opts.items||[]);
    if(!items.length){ toast('No photos to choose from yet'); return; }
    const cur=opts.current;
    const cells=items.map(ref=>`<button class="sorted-cell${ref===cur?' is-current':''}" data-sorted-pick="${esc(ref)}" data-sorted-thumb="${esc(ref)}" aria-label="Choose photo">${ref===cur?`<span class="sorted-star">${I.star}</span>`:''}</button>`).join('');
    sheet(`<h2>${esc(opts.title||'Choose photo')}</h2><div class="sorted-grid">${cells}</div>`);
    $mr.querySelectorAll('[data-sorted-thumb]').forEach(async el=>{
      const u=await opts.resolve(el.getAttribute('data-sorted-thumb'));
      if(u) el.style.backgroundImage=`url(${u})`;
    });
    $mr.querySelectorAll('[data-sorted-pick]').forEach(el=>el.onclick=()=>{
      const ref=el.getAttribute('data-sorted-pick');
      closeSheet();
      if(opts.onPick) opts.onPick(ref);
    });
  }
  return { pickGrid };
})();

/* ---------- CROP EDITOR: frame a square region, save it as the cover ---------- */
async function openCropEditor(houseId, photoId){
  const url=await photoURL(photoId); if(!url){ toast('Could not open that photo'); return; }
  const $mr=document.getElementById('modal-root');
  $mr.innerHTML=`<div class="scrim" data-crop-scrim>
    <div class="sheet" role="dialog" aria-modal="true" style="max-width:520px">
      <div class="grab"></div>
      <h2>Crop cover</h2>
      <p class="muted" style="font-size:13px;margin:0 0 12px">Drag to move, pinch or use the slider to zoom. The square is what shows as the cover.</p>
      <div id="crop-stage" style="position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:var(--radius);background:#000;touch-action:none">
        <img id="crop-img" src="${url}" style="position:absolute;transform-origin:0 0;user-select:none;-webkit-user-drag:none;pointer-events:none" draggable="false">
        <div style="position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);pointer-events:none"></div>
      </div>
      <div class="field" style="margin-top:12px"><label>Zoom</label>
        <input type="range" id="crop-zoom" min="1" max="4" step="0.01" value="1" style="width:100%;accent-color:var(--brass)"></div>
      <div class="crow" style="margin-top:4px">
        <button class="btn" data-crop-cancel>Cancel</button>
        <button class="btn primary" data-crop-save>Use as cover</button>
      </div>
    </div></div>`;

  const stage=document.getElementById('crop-stage');
  const img=document.getElementById('crop-img');
  const zoom=document.getElementById('crop-zoom');
  const st={scale:1,minScale:1,x:0,y:0,natW:0,natH:0,box:0};

  function layout(){
    st.box=stage.clientWidth;
    // cover-fit: min scale fills the square
    const cover=st.box/Math.min(st.natW,st.natH);
    st.minScale=cover; zoom.min=cover.toFixed(3); zoom.max=(cover*4).toFixed(3);
    if(st.scale<cover) st.scale=cover;
    img.style.width=st.natW+'px'; img.style.height=st.natH+'px';
    center(); apply();
  }
  function center(){ st.x=(st.box-st.natW*st.scale)/2; st.y=(st.box-st.natH*st.scale)/2; }
  function clamp(){
    const w=st.natW*st.scale, h=st.natH*st.scale;
    st.x=Math.min(0,Math.max(st.box-w,st.x));
    st.y=Math.min(0,Math.max(st.box-h,st.y));
  }
  function apply(){ clamp(); img.style.transform=`translate(${st.x}px,${st.y}px) scale(${st.scale})`; zoom.value=st.scale; }

  const im=new Image();
  im.onload=()=>{ st.natW=im.naturalWidth; st.natH=im.naturalHeight; layout(); };
  im.src=url;

  // drag
  let drag=null;
  stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,y:e.clientY,ox:st.x,oy:st.y}; stage.setPointerCapture(e.pointerId); });
  stage.addEventListener('pointermove',e=>{ if(!drag)return; st.x=drag.ox+(e.clientX-drag.x); st.y=drag.oy+(e.clientY-drag.y); apply(); });
  stage.addEventListener('pointerup',()=>{ drag=null; });
  stage.addEventListener('pointercancel',()=>{ drag=null; });
  // pinch
  let pts=new Map(), pinch=null;
  stage.addEventListener('pointerdown',e=>pts.set(e.pointerId,e));
  stage.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId))return; pts.set(e.pointerId,e);
    if(pts.size===2){
      const [a,b]=[...pts.values()]; const dist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const cx=(a.clientX+b.clientX)/2-stage.getBoundingClientRect().left, cy=(a.clientY+b.clientY)/2-stage.getBoundingClientRect().top;
      if(pinch){ const ns=Math.max(st.minScale,Math.min(st.minScale*4, st.scale*dist/pinch.dist));
        // zoom around pinch center
        const k=ns/st.scale; st.x=cx-(cx-st.x)*k; st.y=cy-(cy-st.y)*k; st.scale=ns; apply(); }
      pinch={dist};
    }
  });
  stage.addEventListener('pointerup',e=>{ pts.delete(e.pointerId); if(pts.size<2)pinch=null; });
  stage.addEventListener('pointercancel',e=>{ pts.delete(e.pointerId); if(pts.size<2)pinch=null; });
  // slider zoom (around center)
  zoom.oninput=()=>{ const ns=parseFloat(zoom.value); const c=st.box/2; const k=ns/st.scale; st.x=c-(c-st.x)*k; st.y=c-(c-st.y)*k; st.scale=ns; apply(); };

  $mr.querySelector('[data-crop-cancel]').onclick=()=>{ $mr.innerHTML=''; };
  $mr.querySelector('[data-crop-scrim]').addEventListener('click',e=>{ if(e.target.hasAttribute('data-crop-scrim')) $mr.innerHTML=''; });
  $mr.querySelector('[data-crop-save]').onclick=async ()=>{
    try{
      const out=800; const canvas=document.createElement('canvas'); canvas.width=out; canvas.height=out;
      const ctx=canvas.getContext('2d');
      // map the visible square back into source pixels
      const scaleFactor=out/st.box;
      const srcX=-st.x/st.scale, srcY=-st.y/st.scale, srcSize=st.box/st.scale;
      ctx.drawImage(im, srcX, srcY, srcSize, srcSize, 0, 0, out, out);
      const blob=await new Promise((res,rej)=>canvas.toBlob(b=>b?res(b):rej(new Error('encode')),'image/jpeg',0.85));
      const h=houseById(houseId); const id=uid();
      await photoPut({id,blob,houseId,createdAt:now(),cropped:true});
      h.photos=h.photos||[]; h.photos.push(id); h.cover=id; h.updatedAt=now(); persist.houses();
      $mr.innerHTML=''; render(); toast('Cover cropped & set');
    }catch(err){ toast('Could not save crop'); }
  };
}

function setViewerCover(){

  if(!h||!pid) return;
  h.cover=pid; h.updatedAt=now(); persist.houses();
  if(view.name==='house') render();
  toast('Set as cover');
}
/* ===== SORTED ENGINE END ===== */

function openViewer(houseId,photoId){

async function deleteViewerPhoto(){

/* CHUNK4_ROTATE_PHOTO — rotate the stored image 90deg clockwise and re-save it */
async function rotatePhoto(){
  const pid=vw.photos[vw.index]; if(!pid)return;
  toast('Rotating…');
  try{
    const rec=await photoGet(pid); if(!rec) throw new Error('missing photo');
    const url=URL.createObjectURL(rec.blob);
    const img=new Image();
    await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
    const c=document.createElement('canvas'); c.width=img.height; c.height=img.width;
    const ctx=c.getContext('2d');
    ctx.translate(c.width/2,c.height/2); ctx.rotate(Math.PI/2); ctx.drawImage(img,-img.width/2,-img.height/2);
    URL.revokeObjectURL(url);
    const blob=await new Promise(res=>c.toBlob(res,'image/jpeg',0.9));
    if(!blob) throw new Error('encode failed');
    await photoPut({id:pid,blob,houseId:rec.houseId,createdAt:rec.createdAt});
    if(_objUrls.has(pid)){ URL.revokeObjectURL(_objUrls.get(pid)); _objUrls.delete(pid); }
    vw.scale=1; vw.tx=0; vw.ty=0;
    const freshUrl=await photoURL(pid);
    const vimg=$viewer.querySelector('#v-img');
    if(vimg){ vimg.style.transform='translate(0px,0px) scale(1)'; vimg.src=freshUrl; }
    if(view.name==='house') render();
    toast('Rotated');
  }catch(err){ toast('Could not rotate photo'); }
}

function viewerNav(dir){
  const n=vw.photos.length; if(n<2)return;
  vw.index=(vw.index+dir+n)%n;
  renderViewerFrame();
}

function bindViewerGestures(){
  const stage=document.getElementById('v-stage'), img=document.getElementById('v-img');
  let mode=null;
  let startDist=0, startScale=1, startMidX=0, startMidY=0, startTx=0, startTy=0;
  let startX=0, startY=0, dragDX=0, dragDY=0;
  let lastTapT=0, lastTapX=0, lastTapY=0;

  const dist=t=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
  const mid=t=>({x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2});

  function apply(){ img.style.transform=`translate(${vw.tx}px,${vw.ty}px) scale(${vw.scale})`; }
  function clampPan(){
    const r=stage.getBoundingClientRect();
    const maxX=Math.max(0,(r.width*(vw.scale-1))/2);
    const maxY=Math.max(0,(r.height*(vw.scale-1))/2);
    vw.tx=Math.max(-maxX,Math.min(maxX,vw.tx));
    vw.ty=Math.max(-maxY,Math.min(maxY,vw.ty));
  }

  stage.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      mode='pinch';
      startDist=dist(e.touches); startScale=vw.scale;
      const r=stage.getBoundingClientRect(); const m=mid(e.touches);
      startMidX=m.x-r.left-r.width/2; startMidY=m.y-r.top-r.height/2;
      startTx=vw.tx; startTy=vw.ty;
    }else if(e.touches.length===1){
      const t=e.touches[0]; startX=t.clientX; startY=t.clientY; dragDX=0; dragDY=0;
      startTx=vw.tx; startTy=vw.ty;
      mode=vw.scale>1.02?'pan':'swipe';
    }
  },{passive:true});

  stage.addEventListener('touchmove',e=>{
    if(mode==='pinch'&&e.touches.length===2){
      e.preventDefault();
      const r=dist(e.touches)/startDist;
      vw.scale=Math.max(1,Math.min(4,startScale*r));
      vw.tx=startMidX-vw.scale*(startMidX-startTx)/startScale;
      vw.ty=startMidY-vw.scale*(startMidY-startTy)/startScale;
      clampPan(); apply();
    }else if(mode==='pan'&&e.touches.length===1){
      e.preventDefault();
      const t=e.touches[0];
      vw.tx=startTx+(t.clientX-startX); vw.ty=startTy+(t.clientY-startY);
      clampPan(); apply();
    }else if(mode==='swipe'&&e.touches.length===1){
      const t=e.touches[0]; dragDX=t.clientX-startX; dragDY=t.clientY-startY;
      if(Math.abs(dragDX)>Math.abs(dragDY)) e.preventDefault();
      img.style.transform=`translate(${dragDX}px,0px) scale(1)`;
    }
  },{passive:false});

  stage.addEventListener('touchend',()=>{
    if(mode==='pinch'){
      if(vw.scale<1.02){ vw.scale=1; vw.tx=0; vw.ty=0; apply(); }
      mode=null; return;
    }
    if(mode==='pan'){ mode=null; return; }
    if(mode==='swipe'){
      if(Math.abs(dragDX)>60&&Math.abs(dragDX)>Math.abs(dragDY)){
        viewerNav(dragDX<0?1:-1);
      }else{
        img.style.transform=`translate(0px,0px) scale(1)`;
        const t0=Date.now(), dx=startX-lastTapX, dy=startY-lastTapY;
        if(t0-lastTapT<320&&Math.hypot(dx,dy)<30){
          const r=stage.getBoundingClientRect();
          const ox=startX-r.left-r.width/2, oy=startY-r.top-r.height/2;
          if(vw.scale>1){ vw.scale=1; vw.tx=0; vw.ty=0; }
          else{ vw.scale=2.5; vw.tx=ox*(1-vw.scale); vw.ty=oy*(1-vw.scale); clampPan(); }
          apply(); lastTapT=0;
        }else{ lastTapT=t0; lastTapX=startX; lastTapY=startY; }
      }
      mode=null;
    }
  });

  stage.addEventListener('touchcancel',()=>{ mode=null; });
}

/* ============================================================

const $annotate=document.getElementById('annotate');
let an={houseId:null,srcId:null,shape:'circle',color:'#D7A94B'};
let anUndo=[];
let anPending=null; /* {box,shape} once a shape is drawn and we're waiting for the note tap */

async function openAnnotate(){

}
function closeAnnotate(){

}
function cancelAnnotate(){
  if(anUndo.length){ if(!confirm('Discard this markup?')) return; }
  closeAnnotate();
}

function annotateHintText(){
  return anPending ? 'Tap where the note should go' : 'Drag around the area to flag \u2014 add as many as you like';
}
function updateAnnotateHint(){
  const el=document.getElementById('a-hint'); if(el) el.textContent=annotateHintText();
}

async function renderAnnotateFrame(){
  $annotate.innerHTML=`
    <div class="a-top">
      <button class="icon-btn" data-a-cancel aria-label="Cancel">${I.x}</button>
      <span class="a-title">Callout</span>
      <button class="btn primary sm" data-a-save>Save</button>
    </div>
    <div class="a-tools">
      <span class="a-shapes">
        <button class="a-tool active" data-a-shape="circle" aria-label="Circle">◯</button>
        <button class="a-tool" data-a-shape="box" aria-label="Box">▭</button>
      </span>
      <span class="a-swatches">
        <button class="a-swatch" data-a-color="#C8654B" style="background:#C8654B" aria-label="Red"></button>
        <button class="a-swatch active" data-a-color="#D7A94B" style="background:#D7A94B" aria-label="Brass"></button>
        <button class="a-swatch" data-a-color="#FFFFFF" style="background:#FFFFFF" aria-label="White"></button>
      </span>
      <button class="icon-btn" data-a-undo aria-label="Undo">${I.undo}</button>
    </div>
    <div class="a-stage" id="a-stage"><canvas id="a-canvas"></canvas></div>
    <div class="a-hint" id="a-hint">${annotateHintText()}</div>`;
  $annotate.querySelector('[data-a-cancel]').onclick=cancelAnnotate;
  $annotate.querySelector('[data-a-save]').onclick=saveAnnotation;
  $annotate.querySelectorAll('[data-a-shape]').forEach(b=>b.onclick=()=>{
    an.shape=b.dataset.aShape;
    $annotate.querySelectorAll('[data-a-shape]').forEach(x=>x.classList.toggle('active',x===b));
  });
  $annotate.querySelectorAll('[data-a-color]').forEach(b=>b.onclick=()=>{
    an.color=b.dataset.aColor;
    $annotate.querySelectorAll('[data-a-color]').forEach(x=>x.classList.toggle('active',x===b));
  });
  $annotate.querySelector('[data-a-undo]').onclick=()=>{ annotateUndo(); updateAnnotateHint(); };

  const stage=document.getElementById('a-stage'), canvas=document.getElementById('a-canvas');
  const url=await photoURL(an.srcId); if(!url){ toast('Could not load photo'); cancelAnnotate(); return; }
  const img=new Image();
  await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
  const natW=img.naturalWidth||img.width, natH=img.naturalHeight||img.height;
  canvas.width=natW; canvas.height=natH;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,0,0,natW,natH);
  fitAnnotateCanvas(canvas,stage,natW,natH);
  bindAnnotateGestures(canvas,stage,ctx);
}

function fitAnnotateCanvas(canvas,stage,natW,natH){
  const r=stage.getBoundingClientRect();
  const availW=Math.max(60,r.width-32), availH=Math.max(60,r.height-32);
  const scale=Math.min(availW/natW, availH/natH);
  canvas.style.width=Math.round(natW*scale)+'px';
  canvas.style.height=Math.round(natH*scale)+'px';
}

function pushAnnotateUndoSnap(snap){
  if(anUndo.length>=15) anUndo.shift();
  anUndo.push(snap);
}
function annotateUndo(){
  const canvas=document.getElementById('a-canvas'); if(!canvas||!anUndo.length)return;
  const ctx=canvas.getContext('2d');
  const snap=anUndo.pop();
  ctx.putImageData(snap,0,0);
  anPending=null;
  const stage=document.getElementById('a-stage');
  const existing=stage&&stage.querySelector('.a-textinput'); if(existing) existing.remove();
}

function shapeBoundsFromPts(p0,p1){
  return { x0:Math.min(p0.x,p1.x), y0:Math.min(p0.y,p1.y), x1:Math.max(p0.x,p1.x), y1:Math.max(p0.y,p1.y) };
}
function drawShapePreview(ctx,base,box,shape,color,lineWidth){
  ctx.putImageData(base,0,0);
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=lineWidth; ctx.lineJoin='round';
  if(shape==='circle'){
    const cx=(box.x0+box.x1)/2, cy=(box.y0+box.y1)/2, rx=(box.x1-box.x0)/2, ry=(box.y1-box.y0)/2;
    ctx.beginPath(); ctx.ellipse(cx,cy,Math.max(rx,4),Math.max(ry,4),0,0,Math.PI*2); ctx.stroke();
  }else{
    ctx.strokeRect(box.x0,box.y0,box.x1-box.x0,box.y1-box.y0);
  }
  ctx.restore();
}
function drawArrowhead(ctx,tipX,tipY,dirAngle,color,size){
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(tipX,tipY);
  ctx.lineTo(tipX-size*Math.cos(dirAngle-0.45),tipY-size*Math.sin(dirAngle-0.45));
  ctx.lineTo(tipX-size*Math.cos(dirAngle+0.45),tipY-size*Math.sin(dirAngle+0.45));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function bindAnnotateGestures(canvas,stage,ctx){
  let dragging=false, dragStart=null, lastPt=null, preDragSnap=null;
  let rafPending=false;
  const ptFromEvent=(clientX,clientY)=>{
    const r=canvas.getBoundingClientRect();
    return { x:(clientX-r.left)*(canvas.width/r.width), y:(clientY-r.top)*(canvas.height/r.height) };
  };
  const shapeLineW=()=>Math.max(4,canvas.width*0.007);
  const minDragPx=()=>Math.max(18,canvas.width*0.02);

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0]; const pt=ptFromEvent(t.clientX,t.clientY);
    if(anPending){
      placeAnnotateNote(t.clientX,t.clientY,pt,canvas,stage,ctx);
      return;
    }
    dragging=true; dragStart=pt; lastPt=pt;
    preDragSnap=ctx.getImageData(0,0,canvas.width,canvas.height);
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    if(!dragging||anPending)return;
    e.preventDefault();
    const t=e.touches[0]; lastPt=ptFromEvent(t.clientX,t.clientY);
    if(!rafPending){
      rafPending=true;
      requestAnimationFrame(()=>{
        rafPending=false;
        if(dragging&&!anPending) drawShapePreview(ctx,preDragSnap,shapeBoundsFromPts(dragStart,lastPt),an.shape,an.color,shapeLineW());
      });
    }
  },{passive:false});

  canvas.addEventListener('touchend',()=>{
    if(!dragging||anPending){ dragging=false; return; }
    dragging=false;
    const dist=Math.hypot(lastPt.x-dragStart.x,lastPt.y-dragStart.y);
    if(dist<minDragPx()){
      ctx.putImageData(preDragSnap,0,0);
      return;
    }
    const box=shapeBoundsFromPts(dragStart,lastPt);
    drawShapePreview(ctx,preDragSnap,box,an.shape,an.color,shapeLineW());
    pushAnnotateUndoSnap(preDragSnap);
    anPending={ box, shape:an.shape };
    updateAnnotateHint();
  });
  canvas.addEventListener('touchcancel',()=>{
    if(dragging&&preDragSnap) ctx.putImageData(preDragSnap,0,0);
    dragging=false;
  });
}

function placeAnnotateNote(clientX,clientY,canvasPt,canvas,stage,ctx){
  const pending=anPending; if(!pending)return;
  const box=pending.box, color=an.color;

  /* CHUNK9_NOTE_EDGE_CLAMP — the arrow is now drawn at commit time, once we
     know the note text and can keep it fully inside the photo. */
  const existing=stage.querySelector('.a-textinput'); if(existing) existing.remove();
  const r=stage.getBoundingClientRect();
  const dispScale=canvas.getBoundingClientRect().width/canvas.width;
  const fontCanvasPx=Math.max(26,canvas.width*0.04);

  const inp=document.createElement('input');
  inp.type='text'; inp.className='a-textinput';
  inp.placeholder='Note\u2026';
  const inputW=Math.min(220,Math.round(r.width*0.7));
  let leftPx=clientX-r.left;
  if(leftPx+inputW>r.width-8) leftPx=Math.max(8,r.width-8-inputW);
  const topPx=clientY-r.top;
  inp.style.cssText='position:absolute;left:'+leftPx+'px;top:'+topPx+'px;transform:translateY(-50%);'+
    'width:'+inputW+'px;background:rgba(0,0,0,.55);border:1px dashed '+color+';color:'+color+';'+
    'font-size:'+Math.round(fontCanvasPx*dispScale)+'px;padding:3px 7px;border-radius:4px;outline:none;';
  stage.appendChild(inp); inp.focus();

  let done=false;
  const commit=()=>{
    if(done)return; done=true;
    const val=inp.value.trim(); inp.remove();
    if(!val){ anPending=null; updateAnnotateHint(); return; }

    ctx.font='700 '+fontCanvasPx+'px system-ui,-apple-system,sans-serif';
    ctx.textBaseline='middle'; ctx.textAlign='left';
    const textW=ctx.measureText(val).width;
    const margin=Math.max(10,canvas.width*0.012);
    let tx=canvasPt.x, ty=canvasPt.y;
    if(tx+textW+margin>canvas.width) tx=canvas.width-textW-margin;
    if(tx<margin) tx=margin;
    const halfH=fontCanvasPx*0.6;
    if(ty-halfH<margin) ty=margin+halfH;
    if(ty+halfH>canvas.height-margin) ty=canvas.height-halfH-margin;

    const cx=(box.x0+box.x1)/2, cy=(box.y0+box.y1)/2;
    const halfSpan=Math.max(box.x1-box.x0,box.y1-box.y0)/2;
    const dx=cx-tx, dy=cy-ty;
    const dist=Math.hypot(dx,dy)||1;
    const reach=Math.min(halfSpan*0.95, dist*0.9);
    const t=Math.max(0,(dist-reach)/dist);
    const tipX=tx+dx*t, tipY=ty+dy*t;
    const angle=Math.atan2(tipY-ty,tipX-tx);
    const lineWd=Math.max(3,canvas.width*0.005);
    ctx.save();
    ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=lineWd+3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tipX,tipY); ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=lineWd;
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tipX,tipY); ctx.stroke();
    ctx.restore();
    drawArrowhead(ctx,tipX,tipY,angle,color,Math.max(10,canvas.width*0.016));

    ctx.font='700 '+fontCanvasPx+'px system-ui,-apple-system,sans-serif';
    ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.lineWidth=Math.max(3,fontCanvasPx*0.12); ctx.strokeStyle='rgba(0,0,0,.6)';
    ctx.strokeText(val,tx,ty);
    ctx.fillStyle=color; ctx.fillText(val,tx,ty);

    anPending=null;
    updateAnnotateHint();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } });
}

async function saveAnnotation(){
  const canvas=document.getElementById('a-canvas'); if(!canvas)return;
  toast('Saving markup…');
  try{
    const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.9));
    if(!blob) throw new Error('encode failed');
    const h=houseById(an.houseId); if(!h) throw new Error('no house');
    const newId=uid();
    await photoPut({id:newId,blob,houseId:an.houseId,createdAt:now()});
    h.photos=h.photos||[]; h.photos.push(newId);
    if(!h.cover) h.cover=newId;
    h.updatedAt=now(); persist.houses();
    closeAnnotate();
    if(view.name==='house') render();
    toast('Annotated photo saved');
    openViewer(an.houseId,newId);
  }catch(err){ toast('Could not save markup'); }
}

/* ============================================================
   BACKUP — export / import (photos as base64)
   ============================================================ */
function blobToB64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(r.error); r.readAsDataURL(blob); }); }
function b64ToBlob(b64,type='image/jpeg'){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return new Blob([a],{type}); }

/* CHUNK22_IMPORT_SHARED_PROJECT */
async function importSharedProject(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  try{
    const text=await file.text(); const d=JSON.parse(text);
    if(d.app!=='notebuilt-project-share') throw new Error('Not a shared Notebuilt project file');
    const p=d.project||{};
    if(!p.name) throw new Error('Missing project name');
    const newId=uid();
    const category=(typeof categoryById==='function'&&categoryById('construction'))?'construction':null;
    const nh={
      id:newId, name:p.name, category,
      status:p.status||'active', jobType:p.jobType||'',
      address:p.address||'', notes:p.notes||'',
      specs:(p.specs||[]).map(s=>({id:uid(),category:s.category,room:s.room,label:s.label,value:s.value,note:s.note,createdAt:now()})),
      photos:[], cover:null, createdAt:now(), updatedAt:now()
    };
    houses.push(nh);
    if(Array.isArray(p.tasks)&&p.tasks.length){
      p.tasks.forEach(t=>{
        tasks.push({id:uid(),text:t.text,status:t.status||'todo',houseId:newId,createdAt:now(),updatedAt:now(),doneAt:null,dueDate:null});
      });
      persist.tasks();
    }
    if(p.photos){
      for(const [oldPid,pd] of Object.entries(p.photos)){
        try{
          const newPid=uid();
          const blob=b64ToBlob(pd.b64);
          await photoPut({id:newPid,blob,houseId:newId,createdAt:pd.createdAt||now()});
          nh.photos.push(newPid);
          if(!nh.cover) nh.cover=newPid;
        }catch(err){}
      }
    }
    persist.houses();
    e.target.value='';
    go('house',newId);
    toast('Project imported');
  }catch(err){
    e.target.value='';
    alert('Could not import: '+(err.message||'that file doesn\'t look like a shared Notebuilt project'));
  }
}

async function exportData(){
  toast('Building backup…');
  const photos=await photoAll();
  const photoData={};
  for(const p of photos){ photoData[p.id]={houseId:p.houseId,createdAt:p.createdAt,b64:await blobToB64(p.blob)}; }
  /* CHUNK13_RENAME_BACKUP */
  const dump={ app:'notebuilt', version:1, exportedAt:now(), houses, tasks, notes, photos:photoData };
  const blob=new Blob([JSON.stringify(dump)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`notebuilt-backup-${todayKey()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup downloaded');
  settings.lastBackupAt=now(); persist.settings();
}
async function importData(e){
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  if(!confirm('Restore will REPLACE everything currently in the app with the backup. Continue?')) return;
  try{
    const text=await file.text(); const d=JSON.parse(text);
    if(d.app!=='notebuilt' && d.app!=='punchlist') throw new Error('Not a Notebuilt backup');
    houses=d.houses||[]; tasks=d.tasks||[]; notes=d.notes||[];
    persist.houses(); persist.tasks(); persist.notes();
    /* photos */
    const existing=await photoAll(); for(const p of existing) await photoDel(p.id).catch(()=>{});
    _objUrls.clear();
    for(const [id,p] of Object.entries(d.photos||{})){ await photoPut({id,blob:b64ToBlob(p.b64),houseId:p.houseId,createdAt:p.createdAt}); }
    go('houses'); toast('Backup restored');
  }catch(err){ alert('Could not restore: '+err.message); }
}

/* ============================================================
   APP LOCK (PIN, hashed with SHA-256 + salt)
   ============================================================ */
async function sha(text){ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
function randSalt(){ return [...crypto.getRandomValues(new Uint8Array(8))].map(b=>b.toString(16).padStart(2,'0')).join(''); }

const $lock=document.getElementById('lock');
function showShell(show){ document.getElementById('app').classList.toggle('hidden',!show); $nav.classList.toggle('hidden',!show); }

function lockGate(){
  if(!settings.pinHash){ $lock.classList.add('hidden'); showShell(true); render(); maybeShowInstallPrompt(); maybeShowDataSafetyNudge(); return; }
  showShell(false); $fab.classList.add('hidden');
  let entry='', verifying=true;
  const draw=(err='')=>{
    $lock.classList.remove('hidden');
    $lock.innerHTML=`<div class="mark">${MARK}</div><div class="name">${esc(APP_NAME)}</div>
      <div class="hint">Enter PIN</div>
      <div class="dots">${[0,1,2,3].map(i=>`<div class="d ${i<entry.length?'on':''}"></div>`).join('')}</div>
      <div class="err">${esc(err)}</div>
      <div class="keypad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-k="${n}">${n}</button>`).join('')}<button class="blank"></button><button data-k="0">0</button><button data-k="del">⌫</button></div>`;
    $lock.querySelectorAll('[data-k]').forEach(b=>b.onclick=async()=>{
      const k=b.dataset.k;
      if(k==='del'){ entry=entry.slice(0,-1); draw(); return; }
      if(entry.length>=4) return;
      entry+=k;
      if(entry.length===4){
        const ok=(await sha(entry+settings.pinSalt))===settings.pinHash;
        if(ok){ $lock.classList.add('hidden'); showShell(true); render(); maybeShowInstallPrompt(); maybeShowDataSafetyNudge(); }
        else{ entry=''; draw('Wrong PIN'); }
      } else draw();
    });
  };
  draw();
}

function setupPin(){
  let stage=1, first='', entry='';
  const draw=(msg)=>{
    sheet(`<h2>${settings.pinHash?'Change PIN':'Set a PIN'}</h2>
      <div class="muted" style="text-align:center;margin-bottom:6px">${msg}</div>
      <div class="dots" style="justify-content:center">${[0,1,2,3].map(i=>`<div class="d ${i<entry.length?'on':''}"></div>`).join('')}</div>
      <div class="keypad" style="margin:14px auto 4px">${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-k="${n}">${n}</button>`).join('')}<button class="blank"></button><button data-k="0">0</button><button data-k="del">⌫</button></div>`);
    $mr.querySelectorAll('[data-k]').forEach(b=>b.onclick=async()=>{
      const k=b.dataset.k;
      if(k==='del'){ entry=entry.slice(0,-1); draw(msg); return; }
      if(entry.length>=4) return; entry+=k;
      if(entry.length<4){ draw(msg); return; }
      if(stage===1){ first=entry; entry=''; stage=2; draw('Re-enter to confirm'); }
      else{ if(entry===first){ const salt=randSalt(); settings.pinSalt=salt; settings.pinHash=await sha(first+salt); persist.settings(); closeSheet(); render(); toast('App lock on'); }
        else{ entry=''; stage=1; first=''; draw('Did not match — try again'); } }
    });
  };
  draw('Choose a 4-digit PIN');
}

/* ============================================================
   BOOT
   ============================================================ */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{})); }
/* CHUNK18_INSTALL_PROMPT */
let deferredInstallPrompt=null;
let installPromptShown=false;
function isStandaloneApp(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }
function isIOSDevice(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
function appUnlocked(){ return $lock.classList.contains('hidden'); }

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  maybeShowInstallPrompt();
});
if(isIOSDevice()) setTimeout(maybeShowInstallPrompt,1200);

function maybeShowInstallPrompt(){
  if(installPromptShown||isStandaloneApp()||localStorage.getItem('installPromptDismissed')||!appUnlocked()) return;
  if(document.getElementById('backup-banner')) return;
  if(deferredInstallPrompt) showInstallBanner('android');
  else if(isIOSDevice()) showInstallBanner('ios');
}

/* CHUNK21_BACKUP_NUDGE — quiet, infrequent, never a modal */
async function maybeShowDataSafetyNudge(){
  if(!appUnlocked()) return;
  if(document.getElementById('install-banner')||document.getElementById('backup-banner')) return;
  if(!houses.length) return;
  const snoozeUntil=parseInt(localStorage.getItem('backupNudgeSnoozeUntil')||'0',10);
  if(Date.now()<snoozeUntil) return;

  const last=settings.lastBackupAt||0;
  const daysSince=last?(Date.now()-last)/86400000:Infinity;
  const backupDue=daysSince>=21;

  let notPersistent=false;
  if(navigator.storage&&navigator.storage.persisted){
    try{ notPersistent=!(await navigator.storage.persisted()); }catch(e){}
  }

  if(!backupDue&&!notPersistent) return;
  showDataSafetyBanner(!last, notPersistent);
}
function showDataSafetyBanner(neverBackedUp, notPersistent){
  if(document.getElementById('backup-banner')||document.getElementById('install-banner')) return;
  let msg;
  if(neverBackedUp&&notPersistent) msg="You haven't backed up yet, and this browser hasn't confirmed your data is protected from being cleared.";
  else if(neverBackedUp) msg="You haven't exported a backup yet. Keep a copy somewhere safe.";
  else if(notPersistent) msg="It's been a while since your last backup, and this browser hasn't confirmed your data is protected from being cleared.";
  else msg="It's been a while since your last backup. Keep a copy somewhere safe.";
  const el=document.createElement('div');
  el.id='backup-banner';
  el.innerHTML=`<div class="txt"><b>Back up your projects</b>${msg}</div>
    <button class="btn primary sm" id="backup-go">Back up now</button>
    <button class="icon-btn" id="backup-x" aria-label="Not now" style="width:36px;height:36px;flex:none">${I.x}</button>`;
  document.body.appendChild(el);
  document.getElementById('backup-go').onclick=async()=>{
    await exportData();
    dismissBackupBanner();
  };
  document.getElementById('backup-x').onclick=()=>{
    localStorage.setItem('backupNudgeSnoozeUntil', String(Date.now()+7*86400000));
    dismissBackupBanner();
  };
}
function dismissBackupBanner(){
  const el=document.getElementById('backup-banner'); if(el) el.remove();
}
function showInstallBanner(mode){
  if(installPromptShown) return;
  installPromptShown=true;
  const el=document.createElement('div');
  el.id='install-banner';
  el.innerHTML = mode==='android'
    ? `<div class="txt"><b>Add ${esc(APP_NAME)} to your home screen</b>Quick, quiet access \u2014 no app store needed.</div>
       <button class="btn primary sm" id="install-go">Add</button>
       <button class="icon-btn" id="install-x" aria-label="Dismiss" style="width:36px;height:36px;flex:none">${I.x}</button>`
    : `<div class="txt"><b>Add ${esc(APP_NAME)} to your home screen</b>Tap Share, then "Add to Home Screen."</div>
       <button class="icon-btn" id="install-x" aria-label="Dismiss" style="width:36px;height:36px;flex:none">${I.x}</button>`;
  document.body.appendChild(el);
  if(mode==='android'){
    document.getElementById('install-go').onclick=async()=>{
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt=null;
      dismissInstallBanner();
    };
  }
  document.getElementById('install-x').onclick=dismissInstallBanner;
}
function dismissInstallBanner(){
  const el=document.getElementById('install-banner'); if(el) el.remove();
  localStorage.setItem('installPromptDismissed','1');
}

lockGate();
</script>
